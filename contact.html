    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">Sobre Mim</a></li>

                <button id="btn-aumentar" title="Aumentar fonte">
                    <span class="material-symbols-outlined">zoom_in</span>
                </button>
                <button id="btn-diminuir" title="Diminuir fonte">
                    <span class="material-symbols-outlined">zoom_out</span>

    <main>
        <h1>Entre em Contato</h1>
        <p>Preencha o formulário abaixo para me enviar uma mensagem.</p>

        <form id="formContato" action="#" method="POST">
    <div>
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>
    </div>
    <div>
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" placeholder="seu@email.com" required>
    </div>
    <div>
        <label for="mensagem">Mensagem:</label>
        <textarea id="mensagem" name="mensagem" rows="5" placeholder="Escreva sua mensagem aqui..."
            required></textarea>
    </div>
    <button type="submit">Enviar Mensagem</button>
</form>
    </main>
<img src="assets/Icons/celular.png" alt="" class="decorativo decorativo-celular">
    <script src="js/script.js"></script>
</body>
